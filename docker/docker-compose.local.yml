name: smartdesk-ai_local

services:
  db:
    image: postgres:16
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    env_file:
      - ../.envs/.local/.env
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI  →  http://localhost:8025
      - "1025:1025"   # SMTP
    restart: unless-stopped

volumes:
  postgres_data_local:
